<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 755" width="500" height="755">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#1a1c25"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="755" rx="12" fill="url(#bg)"/>

  <!-- Subtle glow at top -->
  <rect width="500" height="250" rx="12" fill="url(#glow)"/>

  <!-- Decorative geometric lines -->
  <g opacity="0.06" stroke="#c084fc" stroke-width="1" fill="none">
    <line x1="60" y1="80" x2="440" y2="80"/>
    <line x1="60" y1="140" x2="440" y2="140"/>
    <line x1="60" y1="200" x2="440" y2="200"/>
    <line x1="60" y1="380" x2="440" y2="380"/>
    <line x1="60" y1="440" x2="440" y2="440"/>
    <line x1="60" y1="500" x2="440" y2="500"/>
  </g>

  <!-- Accent top border line -->
  <rect x="30" y="0" width="440" height="3" fill="url(#accent)" rx="1.5"/>

  <!-- Large stylized initial -->
  <circle cx="250" cy="290" r="90" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
  <circle cx="250" cy="290" r="75" fill="url(#accent)" opacity="0.08"/>
  <text x="250" y="326" font-family="'Space Grotesk', sans-serif" font-size="110" font-weight="700" fill="#c084fc" text-anchor="middle">T</text>

  <!-- Decorative dots -->
  <circle cx="120" cy="200" r="4" fill="#c084fc" opacity="0.15"/>
  <circle cx="380" cy="380" r="4" fill="#2dd4bf" opacity="0.15"/>
  <circle cx="120" cy="380" r="3" fill="#2dd4bf" opacity="0.1"/>
  <circle cx="380" cy="200" r="3" fill="#c084fc" opacity="0.1"/>

  <!-- Bottom tagline -->
  <rect x="150" y="715" width="200" height="1" fill="#ffffff" opacity="0.08"/>
  <text x="250" y="733" font-family="monospace" font-size="8" fill="#ffffff" opacity="0.2" text-anchor="middle" letter-spacing="2">FULL STACK · FLUTTER · NODE.JS</text>
</svg>
