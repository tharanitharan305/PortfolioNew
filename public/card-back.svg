<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#12141c"/>
      <stop offset="100%" stop-color="#1a1c25"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4a24c"/>
      <stop offset="100%" stop-color="#4fa39c"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4fa39c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4fa39c" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="420" rx="12" fill="url(#bg)"/>

  <!-- Subtle glow at top -->
  <rect width="600" height="200" rx="12" fill="url(#glow)"/>

  <!-- Decorative geometric lines -->
  <g opacity="0.06" stroke="#d4a24c" stroke-width="1" fill="none">
    <line x1="50" y1="50" x2="550" y2="50"/>
    <line x1="50" y1="100" x2="550" y2="100"/>
    <line x1="50" y1="150" x2="550" y2="150"/>
    <line x1="50" y1="200" x2="550" y2="200"/>
    <line x1="50" y1="250" x2="550" y2="250"/>
    <line x1="50" y1="300" x2="550" y2="300"/>
    <line x1="50" y1="350" x2="550" y2="350"/>
  </g>

  <!-- Accent top border line -->
  <rect x="40" y="0" width="520" height="3" fill="url(#accent)" rx="1.5"/>

  <!-- Large stylized initial -->
  <circle cx="300" cy="200" r="80" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
  <circle cx="300" cy="200" r="65" fill="url(#accent)" opacity="0.08"/>
  <text x="300" y="228" font-family="'Space Grotesk', sans-serif" font-size="90" font-weight="700" fill="#d4a24c" text-anchor="middle">T</text>

  <!-- Decorative dots -->
  <circle cx="170" cy="145" r="4" fill="#d4a24c" opacity="0.15"/>
  <circle cx="430" cy="255" r="4" fill="#4fa39c" opacity="0.15"/>
  <circle cx="170" cy="255" r="3" fill="#4fa39c" opacity="0.1"/>
  <circle cx="430" cy="145" r="3" fill="#d4a24c" opacity="0.1"/>

  <!-- Bottom tagline -->
  <rect x="180" y="380" width="240" height="1" fill="#ffffff" opacity="0.08"/>
  <text x="300" y="398" font-family="monospace" font-size="8" fill="#ffffff" opacity="0.2" text-anchor="middle" letter-spacing="2">FULL STACK · FLUTTER · NODE.JS</text>
</svg>
